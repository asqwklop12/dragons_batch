spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/dragons_db
    username: application
    password: application
  jpa:
    open-in-view: false
    generate-ddl: false
    show-sql: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_batch_fetch_size: 100
        timezone.default_storage: NORMALIZE_UTC
        jdbc.time_zone: UTC

datasource:
  mysql-jpa:
    primary:
      driver-class-name: com.mysql.cj.jdbc.Driver
      jdbc-url: jdbc:mysql://localhost:3306/dragons_db
      username: application
      password: application
      pool-name: mysql-main-pool
      maximum-pool-size: 40
      minimum-idle: 30

---
spring.config.activate.on-profile: local

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/dragons_db
    username: application
    password: application
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

---
spring.config.activate.on-profile: test

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/dragons_db
    username: ${MYSQL_USER:application}
    password: ${MYSQL_PWD:application}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create

---
spring.config.activate.on-profile: dev

spring:
  datasource:
    url: jdbc:mysql://host.docker.internal:3306/dragons_db
    username: application
    password: application
  jpa:
    show-sql: true

---
spring.config.activate.on-profile: prod

spring:
  datasource:
    url: jdbc:mysql://mysql8:3306/dragons_db
    username: application
    password: application
